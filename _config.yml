# Site settings
title: GivemeAK Blog
SEOTitle: GivemeAK Blog
header-img: img/post-bg-desk.jpg
description: "GivemeAK 的个人博客，记录文章、笔记和实践。"
keyword: "GivemeAK, 博客, Jekyll, GitHub Pages, 技术文章"
url: "https://givemeak.github.io"
baseurl: ""
github_repo: "https://github.com/GivemeAK/GivemeAK.github.io.git"

# Sidebar settings
sidebar: true
sidebar-about-description: "记录、整理、表达，让博客慢慢长成自己的样子。"
sidebar-avatar: /img/about-someone.jpg

# SNS settings
RSS: false

# Build settings
permalink: pretty
paginate: 10
exclude: ["less", "node_modules", "Gruntfile.js", "package.json", "README.md"]
anchorjs: true

# Gems
gems: [jekyll-paginate]

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# Comments
disqus_username:

gitalk:
  enable: false
  clientID: ""
  clientSecret: ""
  repo: ""
  owner: ""
  admin: ""
  distractionFreeMode: true

# Featured Tags
featured-tags: true
featured-condition-size: 1

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# Friends
friends: false
